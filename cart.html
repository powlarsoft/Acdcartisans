<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart - AC/DC Artisans</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header>
    <div class="logo">
      <img src="assets/images/logo.jpg" alt="AC/DC ARTISANS" onerror="this.src='https://via.placeholder.com/180x55/004d40/fff?text=ACDC+ARTISANS';">
      <h2>AC/DC Artisans</h2>
    </div>
    <nav>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search products...">
      </div>
      <div class="hamburger">☰</div>
      <ul id="nav-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="product.html">Shop</a></li>
        <li><a href="cart.html" id="cart-link">Cart</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="#" onclick="adminLogin()">Admin</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h1>Your Shopping Cart</h1>
    <section class="cart-summary">
      <table>
        <thead>
          <tr><th>Product</th><th>Qty</th><th>Price</th><th>Total</th><th></th></tr>
        </thead>
        <tbody></tbody>
      </table>
      <p class="subtotal"></p>
    </section>

    <section class="checkout">
      <button onclick="processPayment()">Proceed to Checkout</button>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 AC/DC Artisans</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - AC/DC Artisans</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header>
    <div class="logo">
      <img src="assets/images/logo.jpg" alt="AC/DC ARTISANS" 
           onerror="this.src='https://via.placeholder.com/180x55/004d40/fff?text=ACDC+ARTISANS';">
      <div>
        <h2>AC/DC Artisans</h2>
        <p class="tagline-small">Power Without Limits</p>
      </div>
    </div>
    <nav>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search products...">
      </div>
      <div class="hamburger">☰</div>
      <ul id="nav-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="product.html">Shop</a></li>
        <li><a href="cart.html" id="cart-link">Cart (<span id="cart-count">0</span>)</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="shop-page">
    <div class="shop-header">
      <h1>Our Premium Products</h1>
      <p>High-Quality Felicity Solar Solutions</p>
    </div>

    <!-- Filters -->
    <div class="filters">
      <select id="categoryFilter">
        <option value="all">All Categories</option>
        <option value="battery">Batteries</option>
        <option value="inverter">Inverters</option>
        <option value="panel">Solar Panels</option>
      </select>
    </div>

    <!-- Products Grid -->
    <div class="product-gallery" id="products-grid"></div>
  </main>

  <!-- Floating WhatsApp -->
  <a href="https://wa.me/2348065994547" target="_blank" class="whatsapp-float" title="Chat on WhatsApp">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp_Logo_2.png" alt="WhatsApp">
  </a>

  <footer>
    <p>&copy; 2026 AC/DC Artisans • Power Without Limits • Lagos, Nigeria</p>
  </footer>

  <script src="js/app.js"></script>

  <script>
    // Product Database (same as dynamic product page)
    const products = [
      {
        id: 1,
        name: "Felicity 200Ah Lithium Battery",
        price: 250000,
        category: "battery",
        image: "assets/images/battery.png"
      },
      {
        id: 2,
        name: "Felicity 6kVA Hybrid Inverter",
        price: 1850000,
        category: "inverter",
        image: "assets/images/6kvahybrid_inverter.jpg"
      },
      {
        id: 3,
        name: "Felicity 550W Monocrystalline Solar Panel",
        price: 185000,
        category: "panel",
        image: "assets/images/550watts_solar_panel.jpg"
      },
      {
        id: 4,
        name: "Felicity 8kVA Hybrid Inverter",
        price: 2450000,
        category: "inverter",
        image: "assets/images/inverter.jpg"
      }
    ];

    const grid = document.getElementById('products-grid');

    function renderProducts(filteredProducts) {
      grid.innerHTML = '';
      
      filteredProducts.forEach(product => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
          <a href="product.html?id=${product.id}" class="product-link">
            <img src="${product.image}" alt="${product.name}">
            <h3>${product.name}</h3>
            <p class="price">₦${product.price.toLocaleString()}</p>
          </a>
          <button class="add-to-cart" 
                  data-name="${product.name}" 
                  data-price="${product.price}"
                  data-image="${product.image}">
            Add to Cart
          </button>
        `;
        grid.appendChild(card);
      });
    }

    // Initial render
    renderProducts(products);

    // Category Filter
    document.getElementById('categoryFilter').addEventListener('change', function() {
      const selected = this.value;
      if (selected === 'all') {
        renderProducts(products);
      } else {
        const filtered = products.filter(p => p.category === selected);
        renderProducts(filtered);
      }
    });

    // Search
    document.getElementById('searchInput').addEventListener('input', function() {
      const term = this.value.toLowerCase();
      const filtered = products.filter(p => p.name.toLowerCase().includes(term));
      renderProducts(filtered);
    });

    // Add to Cart
    function addToCart(name, price, image) {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      const existing = cart.find(item => item.name === name);
      if (existing) existing.quantity += 1;
      else cart.push({ name, price: parseInt(price), image, quantity: 1 });

      localStorage.setItem('cart', JSON.stringify(cart));
      updateCartCount();
      alert(`✅ ${name} added to cart!`);
    }

    function updateCartCount() {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      let count = cart.reduce((sum, item) => sum + item.quantity, 0);
      document.getElementById('cart-count').textContent = count;
    }

    // Event delegation
    document.addEventListener('click', (e) => {
      if (e.target.classList.contains('add-to-cart')) {
        const name = e.target.dataset.name;
        const price = e.target.dataset.price;
        const image = e.target.dataset.image;
        addToCart(name, price, image);
      }
    });

    // Mobile Menu
    const hamburger = document.querySelector('.hamburger');
    const navMenu = document.getElementById('nav-menu');
    hamburger.addEventListener('click', () => navMenu.classList.toggle('active'));

    // Initialize
    window.onload = updateCartCount;
  </script>
</body>
</html>

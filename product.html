<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>200Ah Lithium Battery - AC/DC Artisans</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header>
    <div class="logo">
      <img src="assets/images/logo.jpg" alt="AC/DC ARTISANS" onerror="this.src='https://via.placeholder.com/180x55/004d40/fff?text=ACDC+ARTISANS';">
      <h2>AC/DC Artisans</h2>
    </div>
    <nav>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search products...">
      </div>
      <div class="hamburger">☰</div>
      <ul id="nav-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="product.html">Shop</a></li>
        <li><a href="cart.html" id="cart-link">Cart</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="#" onclick="adminLogin()">Admin</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="product-gallery">
      <div class="main-image">
        <img id="mainImg" src="assets/images/battery.png" alt="200Ah Lithium Battery">
      </div>
      <div class="thumbnails">
        <img src="assets/images/battery.png" onclick="changeImage(this)" alt="Front View">
        <img src="assets/images/battery-side.png" onclick="changeImage(this)" alt="Side View">
        <img src="assets/images/battery-installed.png" onclick="changeImage(this)" alt="Installed">
      </div>
    </section>

    <section class="product-details">
      <h1>200Ah Lithium Battery</h1>
      <p class="price">₦250,000 <span class="old-price">₦300,000</span></p>
      <p>Reliable long-life battery for home and business solar systems.</p>
      <button class="add-to-cart" data-name="200Ah Lithium Battery" data-price="250000">Add to Cart</button>
      <button class="buy-now" data-name="200Ah Lithium Battery" data-price="250000">Buy Now</button>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 AC/DC Artisans</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>

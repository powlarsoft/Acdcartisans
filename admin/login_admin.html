<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - AC/DC Artisans</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #004d40, #00695c);
      padding: 20px;
    }
    .login-box {
      background: white;
      padding: 3rem 2.5rem;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .login-box img {
      width: 80px;
      margin-bottom: 1.5rem;
    }
    .login-box h1 {
      margin-bottom: 0.5rem;
      color: #004d40;
    }
    .form-group {
      margin-bottom: 1.2rem;
      text-align: left;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: #004d40;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1rem;
    }
    .login-btn:hover {
      background: #00695c;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <img src="../assets/images/logo.jpg" alt="AC/DC Artisans" 
           onerror="this.src='https://via.placeholder.com/120x60/004d40/fff?text=ACDC';">
      <h1>Admin Login</h1>
      <p style="color:#666; margin-bottom: 2rem;">Sign in to manage your store</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username or Email</label>
          <input type="text" id="username" placeholder="admin@acdcartisans.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter password" required>
        </div>

        <button type="submit" class="login-btn">Sign In</button>
      </form>

      <p style="margin-top: 1.5rem; font-size: 0.9rem; color:#666;">
        Demo Credentials:<br>
        <strong>Username:</strong> admin<br>
        <strong>Password:</strong> admin123
      </p>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      // Simple demo login
      if ((username === "admin" || username === "admin@acdcartisans.com") && password === "admin123") {
        alert("✅ Login Successful!");
        window.location.href = "dashboard.html";
      } else {
        alert("❌ Invalid credentials. Try again.\n\nHint: admin / admin123");
      }
    });
  </script>
</body>
</html>
